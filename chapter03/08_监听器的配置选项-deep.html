<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <h2>{{info.name}}</h2>
        <h2>{{info.book.name}}</h2>
        <button @click="changeInfo">改变info</button>
        <button @click="changeInfoName">改变info.name</button>
        <button @click="changeInfoBookName">改变info.book.name</button>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const App = {
            template: "#my-app",
            data() {
                return {
                    info: {
                        name: "coderwhy",
                        age: 18,
                        book: {
                            name: 'Vue.js 3+TS'
                        }
                    }
                }
            },
            watch: {
                // 监听info对象的更新
                info: {
                    handler: function (newInfo, oldInfo) {
                        console.log("newValue:", newInfo, "oldValue:", oldInfo);
                    },
                    // 深度监听info对象的更新，info内部属性发生的改变都可以被监听到
                    deep: true
                }
            },
            methods: {
                changeInfo() {
                    this.info = {
                        name: "kobe",
                        age: 18,
                        book: {
                            name: 'Vue.js 3+TS'
                        }
                    }
                },
                changeInfoName() {
                    this.info.name = "rose";
                },
                changeInfoBookName() {
                    this.info.book.name = "React +TS";
                }
            }
        };
        Vue.createApp(App).mount('#app');
    </script>
</body>

</html>
