<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .comps-a,
        .comps-b {
            border: 1px solid #999;
            margin: 3px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <h4>{{message}}</h4>
        <!-- 使用局部注册的组件，在DOM中必须使用kebab-case语法 -->
        <component-a></component-a>
    </template>

    <!-- 编写ComponentA组件的模版 -->
    <template id="component-a">
        <p style="border: 1px solid #999;">
            {{content}}
        </p>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const ComponentA = {
            template: '#component-a',
            data() {
                return {
                    content: `我是在根组件中局部注册的ComponentA组件
                    (ComponentA组件只能在当前根组件的template中使用)`
                }
            }
        };
        const App = {
            template: '#my-app',
            components: {
                // 局部注册ComponentA组件（key为组件名称，value为组件对象）
                'ComponentA': ComponentA
            },
            data() {
                return {
                    message: '我是根组件App'
                }
            }
        };
        Vue.createApp(App).mount("#app");
    </script>
</body>

</html>
