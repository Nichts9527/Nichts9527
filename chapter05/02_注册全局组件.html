<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .comps-a,
        .comps-b {
            border: 1px solid #999;
            margin: 3px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <!-- 1.使用全局组件 -->
        <component-a></component-a>
        <component-b></component-b>
        <component-c></component-c>
    </template>

    <!-- 2.编写component-a/component-b全局组件的模版 -->
    <template id="component-b">
        <div class="comps-b">
            <input type="text" v-model="message">
            <h4>{{message}}</h4>
        </div>
    </template>
    <template id="component-a">
        <div class="comps-a">
            <h4>{{title}}</h4>
            <p>{{desc}}</p>
            <button @click="btnClick">按钮单击</button>
        </div>
    </template>
    <template id="component-c">
        <div class="comps-c">
            ComponentC
        </div>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const App = {
            template: '#my-app',
            data() {
                return {
                    message: 'Hello World'
                }
            },
        };
        const app = Vue.createApp(App);//创建一个Vue实例
        // 3.用app注册一个component-a全局组件
        app.component("component-a", {
            template: "#component-a",//引入第一步定义的模版
            data() {
                return {
                    title: '我是标题',
                    desc: '内容显示区域。。。。。。'
                }
            },
            methods: {
                btnClick() {
                    console.log("按钮单击");
                }
            }
        });
        app.component("component-b", {
            template: "#component-b",//引入第一步定义的模版
            data() {
                return {
                    message: 'Hello World'
                }
            },
            methods: {
                btnClick() {
                    console.log("按钮单击");
                }
            }
        });
        app.component("ComponentC", {
            template: '#component-c',//引入第一步定义的模版
        });
        app.mount("#app");
    </script>
</body>

</html>
