<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <!-- Vue.js内部会自动传入event对象，可在方法中接收 -->
        <button @click="btn1Click">自动传入event对象</button>
        <!-- 手动传入事件对象：$event。$event是固定写法 -->
        <button @click="btn2Click($event,'coderwhy',18)">手动传入event对象</button>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        Vue.createApp({
            template: '#my-app',
            data() {
                return {
                    message: "Hello World"
                }
            },
            methods: {
                btn1Click(event) {
                    console.log(event);//打印自动传入的事件对象
                },
                btn2Click(event, name, age) {
                    console.log(event, name, age);//打印事件对象和其他传入的参数

                }
            }
        }).mount("#app");
    </script>
</body>

</html>
