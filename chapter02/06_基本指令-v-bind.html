<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <!-- v-bind的基本使用 -->
        <img v-bind:src="imgUrl" alt="">
        <a v-bind:href="link">百度一下</a>
        <!-- 冒号语法绑定属性是v-bind指令的语法糖（即简写） -->
        <img :src="imgUrl" alt="">
        <!-- 直接赋值“imgUrl”字符串给src属性 -->
        <!-- <img src="imgUrl" alt=""> -->
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const App = {
            template: "#my-app",
            data() {
                return {
                    imgUrl: "https://v2.cn.vuejs.org/images/logo.svg",
                    link: "https://www.baidu.com"
                }
            }
        }
        Vue.createApp(App).mount("#app");
    </script>
</body>

</html>
