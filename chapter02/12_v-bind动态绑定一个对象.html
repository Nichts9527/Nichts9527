<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <!-- 简写 -->
        <div :="info">v-bind动态绑定一个对象</div>
        <!-- 完整写法 -->
        <div v-bind="info">v-bind动态绑定一个对象</div>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        Vue.createApp({
            template: '#my-app',
            data() {
                return {
                    info: {
                        name: "why",
                        age: 18,
                        height: 1.88
                    }
                }
            }
        }).mount("#app")
    </script>
</body>

</html>
