<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <div :[name]="value">v-bind动态绑定属性名称和值</div>
        <div v-bind:[name]="value">v-bind动态绑定属性名称和值</div>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        Vue.createApp({
            template: '#my-app',
            data() {
                return {
                    name: "username",
                    value: 'kobe'
                }
            },
        }).mount("#app")
    </script>
</body>

</html>
