<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <h2 v-if="isShow">v-if控制显示和隐藏</h2>
        <h2 v-show="isShow">v-show控制显示和隐藏</h2>
        <button v-on="{click:toggle}">切换</button>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const App = {
            template: '#my-app',
            data() {
                return {
                    isShow: false
                }
            },
            methods: {
                toggle() {
                    this.isShow = !this.isShow
                }
            }
        };
        Vue.createApp(App).mount("#app");
    </script>
</body>

</html>
