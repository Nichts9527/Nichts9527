<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <!-- 绑定字符串 -->
        <h2>{{message}}</h2>
        <!-- 绑定HTML字符串 -->
        <h2 v-html="message"></h2>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const App = {
            template: '#my-app',
            data() {
                return {
                    message: '<span style="color: red; background: blue;">你好呀，Vue.js 3</span>'
                }
            }
        }
        Vue.createApp(App).mount("#app")
    </script>
</body>

</html>
