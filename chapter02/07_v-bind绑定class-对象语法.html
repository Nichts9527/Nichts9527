<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <!-- 绑定字符串语法 -->
        <div :class="abc">class绑定字符串1</div>
        <div :class="className">class绑定字符串2</div>
        <!-- 绑定对象，支持{'active':boolean}或{active:boolean}写法 -->
        <div :class="{'active':isActive}">class绑定对象</div>
        <!-- 对象可以有多个键值对 -->
        <div :class="{active:isActive,title:true}">class绑定对象2</div>
        <!-- 默认的class和动态的class结合使用 -->
        <div class="abc cba" :class="{active:isActive,title:true}">默认的class和动态的class结合</div>
        <!-- 将对象放到一个单独的class属性中 -->
        <div class="abc cba" :class="classObj">绑定属性中的对象</div>
        <!-- 将返回的对象放到一个methods(或computed)中 -->
        <div class="abc cba" :class="getClassObj()">绑定methods/computed返回的对象</div>
        <button @click="toggle">切换isActive</button>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const App = {
            template: '#my-app',
            data() {
                return {
                    className: "coderwhy",
                    isActive: true,
                    classObj: {
                        active: false,
                        title: true
                    }
                }
            },
            methods: {
                toggle() {
                    this.isActive = !this.isActive;
                },
                getClassObj() {
                    return {
                        active: false,
                        title: true
                    }
                }
            }
        };
        Vue.createApp(App).mount("#app");
    </script>
</body>

</html>
