<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <input type="text" v-model.number="score">
        <!-- typeof用于查看score的类型 -->
        <h2>{{score}} -> {{typeof this.score}}</h2>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const App = {
            template: '#my-app',
            data() {
                return {
                    score: 90
                }
            }
        }
        Vue.createApp(App).mount("#app");
    </script>
</body>

</html>
