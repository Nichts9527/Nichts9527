<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <template id="my-app">
        <!-- 1.v-bind给value属性绑定message变量 2.监听input事件，更新message变量的值 -->
        <input type="text" :value="message" @input="inputChange">
        <h2>{{message}}</h2>
    </template>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        const App = {
            template: '#my-app',
            data() {
                return {
                    message: "Hello World"
                }
            },
            methods: {
                inputChange(event) {
                    this.message = event.target.value;
                }
            }
        }
        Vue.createApp(App).mount("#app");
    </script>
</body>

</html>
