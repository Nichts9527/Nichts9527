  <script>
    // // 输出1~100的和sum
    var sum = 0;

      sum = sum + i;
    }
    console.log(sum);
    // 输出1000以内的整奇数
    for (i=1;i<=1000;i++) {
      if(i%2!=0){
        console.log(i)
      }
    }
    // 打印九九乘法表
    var result = 0
    for (i = 1; i <= 9; i++) {
      // console.log(i)
      document.write("<br/>")
        for (j = 1; j <= 9; j++) {
          // console.log(j)
          result = i * j
          document.write(i + "*" + j + "=" + i * j)
          document.write(" ")
        }
      }
  </script>
