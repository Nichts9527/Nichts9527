<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    // if语句判读整数奇偶
    var num = 10
    if (num % 2 == 0) {
      console.log('该整数是偶数')
    } else console.log('该整数是奇数')
    // 三目表达式判断整数奇偶
    num % 2 == 0 ? console.log('该整数是偶数') : console.log('该整数是奇数')
  </script>

</body>

</html>
