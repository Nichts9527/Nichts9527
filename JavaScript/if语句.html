<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    var day = 1;
    if (day === 0) {
      console.log('今天是星期一')
    } else if (day === 1) {
      console.log('今天是星期二')
    } else if (day === 2) {
      console.log('今天是星期三')
    } else if (day === 3) {
      console.log('今天是星期四')
    } else if (day === 4) {
      console.log('今天是星期五')
    } else if (day === 5) {
      console.log('今天是星期六')
    } else if (day === 6) {
      console.log('今天是星期天')
    }
  </script>
</body>

</html>
