<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <script src="./Vue.js源码/vue.js"></script>
    <template id="why">
        <div>
            <h2>{{counter}}</h2>
            <button @click='increment'>+1</button>
            <button @click='decrement'>-1</button>
        </div>
    </template>
    <script>
        Vue.createApp({
            template: '#why',
            data: function () {
                return {
                    message: "methods中的this",
                    counter: 100
                }
            },
            methods: {
                //箭头函数
                increment: () => {
                    this.counter++;
                    console.log('increment =>', this);
                },
                //function函数的简写语法
                decrement() {
                    this.counter--;
                    console.log("decrement =>", this);
                },
                //function函数的完整写法
                //decrement:function(){
                //this.counter--;
                //},
            }
        }).mount("#app")
    </script>
</body>

</html>
