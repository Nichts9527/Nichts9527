<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>
    <!-- 用<script>标签编写模版内容，需要添加type和id属性 -->
    <script type="x-template" id="why">
        <div>
            <h2>{{message}}</h2>
            <h2>{{counter}}</h2>
        </div>
    </script>
    <script src="./Vue.js源码/vue.js"></script>
    <script>
        Vue.createApp({
            template: '#why',//通过选择器选中页面上的模版，底层执行document.querySelector("#why")查找
            data: function () {
                return {
                    message: "用<script>标签，优化计数器模版的编写",
                    counter: 100
                }
            },
            methods: {}
        }).mount("#app")
    </script>
</body>

</html>
